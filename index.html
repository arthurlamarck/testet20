<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RPG Roller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- LEFT PANEL -->
  <div class="left">

    <div class="box">
      <h3>Personagem</h3>
      <label>Nível</label>
      <input id="nivel" type="number" value="0">

      <label>Mod Atributo</label>
      <input id="mod" type="number" value="0">

      <label>
        <input type="checkbox" id="treinado"> Treinado
      </label>
    </div>

    <div class="box">
      <h3>Bônus</h3>
      <div class="row">
        <span>Ataque</span>
        <input id="atk_bonus" type="number" value="0">
        <input id="atk_pen" type="number" value="0">
      </div>

      <div class="row">
        <span>Dano</span>
        <input id="dmg_bonus" type="number" value="0">
        <input id="dmg_pen" type="number" value="0">
      </div>
    </div>

    <div class="box">
      <h3>Condições</h3>
      <label><input type="checkbox" id="marca"> Marca</label>
      <label><input type="checkbox" id="monstro"> Monstro</label>
      <label><input type="checkbox" id="grande"> Grande</label>
      <label><input type="checkbox" id="ultimo"> Último Sangue</label>
      <label><input type="checkbox" id="primeiro"> Primeiro Sangue</label>
    </div>

    <div class="box">
      <h3>Arma</h3>
      <select id="arma">
        <option>Presa da Serpente</option>
        <option>Espada Longa</option>
        <option>Machado Grande</option>
      </select>
    </div>

    <div class="box">
      <h3>Passo</h3>
      <button id="passo-">-</button>
      <span id="passo_val">0</span>
      <button id="passo+">+</button>

      <h4>Margem Extra</h4>
      <input id="margem" type="number" value="0">
    </div>

    <div class="box">
      <h3>Preview</h3>
      <div id="preview_roll"></div>
      <div id="preview_dmg"></div>
    </div>

    <button onclick="rolar()">ROLAR</button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <h3 id="total">Dano Total: 0</h3>
    <div id="historico"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
